name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.3"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-14
            platform: macos-arm64
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Build CLI
        run: cargo build -p kinic-vfs-cli --bin kinic-vfs-cli --release --locked
      - name: Package CLI
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          package_version="$(bash scripts/kinic_vfs_cli_release_version.sh)"
          if [ "$RELEASE_VERSION" != "$package_version" ]; then
            echo "release version $RELEASE_VERSION does not match package version $package_version" >&2
            exit 1
          fi
          bash scripts/package_kinic_vfs_cli.sh "$package_version" "${{ matrix.platform }}" target/release/kinic-vfs-cli dist
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: kinic-vfs-cli-${{ matrix.platform }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          package_version="$(bash scripts/kinic_vfs_cli_release_version.sh)"
          if [ "$RELEASE_VERSION" != "$package_version" ]; then
            echo "release version $RELEASE_VERSION does not match package version $package_version" >&2
            exit 1
          fi
          if gh release view "$package_version" >/dev/null 2>&1; then
            gh release upload "$package_version" release-assets/* --clobber
          else
            gh release create "$package_version" release-assets/* --title "$package_version" --generate-notes
          fi
