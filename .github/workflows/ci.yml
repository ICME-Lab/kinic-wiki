name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      canister: ${{ steps.paths.outputs.canister }}
      rust_all: ${{ steps.paths.outputs.rust_all }}
      cli: ${{ steps.paths.outputs.cli }}
      wikibrowser: ${{ steps.paths.outputs.wikibrowser }}
      extension: ${{ steps.paths.outputs.extension }}
      wiki_generator: ${{ steps.paths.outputs.wiki_generator }}
      skill_registry_web: ${{ steps.paths.outputs.skill_registry_web }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: paths
        name: Detect changed areas
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            {
              echo "canister=true"
              echo "rust_all=true"
              echo "cli=true"
              echo "wikibrowser=true"
              echo "extension=true"
              echo "wiki_generator=true"
              echo "skill_registry_web=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"

          has_path() {
            local pattern="$1"
            printf '%s\n' "$changed" | grep -Eq "$pattern"
          }

          set_output() {
            local name="$1"
            local pattern="$2"
            if has_path "$pattern"; then
              echo "$name=true" >> "$GITHUB_OUTPUT"
            else
              echo "$name=false" >> "$GITHUB_OUTPUT"
            fi
          }

          set_output canister '^(Cargo\.lock|crates/(vfs_canister|vfs_runtime|vfs_types)/|docs/DB_LIFECYCLE\.md|scripts/build-vfs-canister\.sh)'
          set_output rust_all '^(Cargo\.toml|crates/(vfs_canister|vfs_runtime|vfs_types|vfs_cli_app|vfs_cli_core|vfs_client|vfs_store|wiki_domain|ic_sqlite_vfs_probe)/|scripts/(kinic_vfs_cli_release_version|package_kinic_vfs_cli)\.sh)'
          set_output cli '^(crates/(vfs_cli_app|vfs_cli_core|vfs_client)/|docs/(CLI|PUBLIC_SMOKE)\.md|scripts/(local|smoke|mainnet|kinic_vfs_cli_release_version|package_kinic_vfs_cli))'
          set_output wikibrowser '^(wikibrowser/|crates/vfs_canister/vfs\.did)'
          set_output extension '^(extensions/wiki-clipper/|crates/vfs_canister/vfs\.did)'
          set_output wiki_generator '^workers/wiki-generator/'
          set_output skill_registry_web '^(skill-registry-web/|wikibrowser/app/skills/|wikibrowser/scripts/check-skill-registry\.mjs|skills/)'

  wikibrowser-check:
    needs: changes
    if: needs.changes.outputs.wikibrowser == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wikibrowser
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: wikibrowser/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run lint
        run: pnpm lint
      - name: Run typecheck
        run: pnpm typecheck
      - name: Build static export
        run: pnpm build
      - name: Build Cloudflare Worker
        run: pnpm build:worker

  wiki-generator-check:
    needs: changes
    if: needs.changes.outputs.wiki_generator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/wiki-generator
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: workers/wiki-generator/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test

  skill-registry-web-check:
    needs: changes
    if: needs.changes.outputs.skill_registry_web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skill-registry-web
    steps:
      - uses: actions/checkout@v5
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: skill-registry-web/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build

  rust-check:
    needs: changes
    if: needs.changes.outputs.canister == 'true' || needs.changes.outputs.rust_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run workspace tests
        if: needs.changes.outputs.rust_all == 'true'
        run: cargo test --workspace --locked
      - name: Run canister core tests
        if: needs.changes.outputs.rust_all != 'true'
        run: cargo test -p vfs-runtime -p vfs-canister --locked
      - name: Guard legacy wiki client aliases
        if: needs.changes.outputs.rust_all == 'true'
        run: |
          ! rg -n '\b(WikiApi|CanisterWikiClient)\b' crates
      - name: Run workspace clippy
        if: needs.changes.outputs.rust_all == 'true'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run canister core clippy
        if: needs.changes.outputs.rust_all != 'true'
        run: cargo clippy -p vfs-runtime -p vfs-canister --all-targets --locked -- -D warnings

  cli-artifacts:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-14
            name: macos-arm64
    steps:
      - uses: actions/checkout@v5
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Build CLI
        run: cargo build -p kinic-vfs-cli --bin kinic-vfs-cli --release --locked
      - name: Package CLI artifact
        run: |
          release_version="$(bash scripts/kinic_vfs_cli_release_version.sh)"
          bash scripts/package_kinic_vfs_cli.sh "$release_version" "${{ matrix.name }}" target/release/kinic-vfs-cli dist
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: kinic-vfs-cli-${{ matrix.name }}
          path: dist/*

  canister-build:
    needs: changes
    if: needs.changes.outputs.canister == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/wiki-clipper/package-lock.json
      - name: Install login page dependencies
        run: npm ci --prefix extensions/wiki-clipper
      - name: Check generated CLI login page
        run: |
          node scripts/build-icp-cli-login.mjs
          git diff --exit-code crates/vfs_canister/src/icp_cli_login.html
      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Use stable Rust
        run: rustup default stable
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install WASI sysroot
        run: sudo apt-get update && sudo apt-get install -y wasi-libc
      - name: Install wasm tooling
        run: cargo install ic-wasm --locked
      - name: Build canister artifact
        env:
          ICP_WASM_OUTPUT_PATH: /tmp/vfs_canister.wasm
        run: bash scripts/build-vfs-canister.sh

  extension-check:
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/wiki-clipper
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extensions/wiki-clipper/package-lock.json
      - name: Enable corepack
        run: corepack enable
        working-directory: .
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm test
      - run: npm run store-assets:generate
      - run: npm run release:package
      - run: npm run release:check
